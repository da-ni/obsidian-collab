name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Update beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 0.1.0-beta
          name: 0.1.0-beta
          prerelease: true
          files: |
            main.js
            manifest.json
            styles.css
